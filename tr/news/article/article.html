<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Haber — DOKA Madencilik</title>
  <link rel="stylesheet" href="../../assets/css/style.css">
  <style>
    .article-hero {
      padding: calc(var(--nav-height) + 56px) 0 48px;
      background: var(--dark-surface);
      border-bottom: 1px solid var(--gold-border);
    }
    .article-hero__inner { max-width: 760px; }
    .article-hero__meta {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }
    .article-hero__cat {
      font-size: 0.65rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--gold);
      font-weight: 500;
    }
    .article-hero__date { font-size: 0.75rem; color: var(--text-muted); }
    .article-hero h1 {
      font-size: clamp(1.9rem, 3.5vw, 2.8rem);
      line-height: 1.15;
      color: var(--white);
      margin-bottom: 20px;
    }
    .article-hero__excerpt {
      font-size: 1.05rem;
      color: var(--text-secondary);
      line-height: 1.75;
    }
    .article-thumb {
      width: 100%;
      max-height: 480px;
      overflow: hidden;
      border-radius: 8px;
      border: 1px solid var(--gold-border);
      margin: 48px 0;
    }
    .article-thumb img {
      width: 100%;
      height: 100%;
      max-height: 480px;
      object-fit: cover;
      display: block;
    }
    .article-body { max-width: 720px; }
    .article-body p {
      font-size: 1rem;
      color: var(--text-secondary);
      line-height: 1.85;
      margin-bottom: 1.4em;
    }
    .article-body p:last-child { margin-bottom: 0; }
    .article-divider { border: none; border-top: 1px solid var(--dark-border); margin: 56px 0; }
    .article-back {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 0.72rem;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-muted);
      text-decoration: none;
      transition: color 0.3s ease;
    }
    .article-back::before { content: '←'; }
    .article-back:hover { color: var(--gold); }
    .article-state { padding: 80px 0; color: var(--text-muted); font-size: 0.9rem; }
  </style>
</head>
<body>

<div id="nav-placeholder"></div>

<div id="articleWrap">
  <section class="article-hero">
    <div class="container">
      <div class="article-state">Haber yükleniyor&hellip;</div>
    </div>
  </section>
</div>

<div id="footer-placeholder"></div>
<script>const ROOT_PATH = '../../'; const LANG = 'tr'; const LANG_EQUIV = '';</script>
<script src="../../assets/js/main.js"></script>
<script>
(function () {
  'use strict';

  const ROOT = '../../';
  const lang = 'tr';
  const DATA = ROOT + 'assets/data/news-data.json';

  const CAT_LABELS = {
    corporate:      'Kurumsal',
    exploration:    'Arama',
    sustainability: 'Sürdürülebilirlik',
    community:      'Toplum',
    press:          'Basın'
  };

  const params    = new URLSearchParams(window.location.search);
  const articleId = params.get('id');

  if (!articleId) {
    showError('Makale belirtilmedi.');
  } else {
    fetch(DATA)
      .then(r => { if (!r.ok) throw new Error(); return r.json(); })
      .then(data => {
        const article = (data.articles || []).find(a => a.id === articleId);
        if (!article) { showError('Makale bulunamadı.'); return; }
        if (article.type === 'external') {
          window.location.replace(article.sourceUrl);
          return;
        }
        renderArticle(article);
      })
      .catch(() => showError('Makale yüklenirken sorun oluştu. Lütfen daha sonra tekrar deneyin.'));
  }

  function renderArticle(a) {
    const t = a[lang];
    document.title = t.title + ' — DOKA Madencilik';

    const thumbHTML = a.thumbnail
      ? `<div class="article-thumb"><img src="${ROOT}${a.thumbnail}" alt="${t.title}" loading="lazy"></div>`
      : '';

    const heroHTML = `
      <section class="article-hero">
        <div class="container">
          <div class="page-hero__breadcrumb" style="margin-bottom:28px;">
            <a href="${ROOT}tr/index.html">Ana Sayfa</a><span>/</span>
            <a href="${ROOT}tr/newsroom.html">Haberler</a><span>/</span>
            <span>${CAT_LABELS[a.category] || a.category}</span>
          </div>
          <div class="article-hero__inner">
            <div class="article-hero__meta">
              <span class="article-hero__cat">${CAT_LABELS[a.category] || a.category}</span>
              <span class="article-hero__date">${a.dateDisplay[lang]}</span>
            </div>
            <h1>${t.title}</h1>
            <p class="article-hero__excerpt">${t.excerpt}</p>
          </div>
        </div>
      </section>`;

    const bodyHTML = `
      <section class="section section--dark">
        <div class="container">
          ${thumbHTML}
          <div class="article-body">
            ${t.content || ''}
          </div>
          <hr class="article-divider">
          <a href="${ROOT}tr/newsroom.html" class="article-back">Haberlere Dön</a>
        </div>
      </section>`;

    document.getElementById('articleWrap').innerHTML = heroHTML + bodyHTML;
  }

  function showError(msg) {
    document.getElementById('articleWrap').innerHTML = `
      <section class="article-hero">
        <div class="container">
          <div class="article-state">${msg} <a href="${ROOT}tr/newsroom.html" style="color:var(--gold);">Haberlere Dön</a></div>
        </div>
      </section>`;
  }
}());
</script>
</body>
</html>
