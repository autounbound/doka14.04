<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 58" fill="none">
  <defs>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E8D08A;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#C9A84C;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#9A7A30;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="goldGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#C9A84C;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7A5E20;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Hex Crystal Mark -->
  <polygon points="32,4 54,16 54,40 32,52 10,40 10,16" fill="url(#goldGrad)" />
  <polygon points="32,4 54,16 32,28" fill="url(#goldGrad2)" opacity="0.5"/>
  <line x1="10" y1="16" x2="32" y2="28" stroke="#7A5E20" stroke-width="0.8" opacity="0.6"/>
  <line x1="54" y1="16" x2="32" y2="28" stroke="#7A5E20" stroke-width="0.8" opacity="0.6"/>
  <line x1="10" y1="40" x2="32" y2="28" stroke="#E8D08A" stroke-width="0.6" opacity="0.4"/>
  <line x1="54" y1="40" x2="32" y2="28" stroke="#E8D08A" stroke-width="0.6" opacity="0.4"/>
  <line x1="32" y1="52" x2="32" y2="28" stroke="#E8D08A" stroke-width="0.6" opacity="0.3"/>
  <circle cx="32" cy="28" r="1.5" fill="#E8D08A" opacity="0.8"/>

  <!-- Wordmark: DOKA -->
  <text x="70" y="36" font-family="Georgia, 'Times New Roman', serif" font-size="28" font-weight="700" letter-spacing="5" fill="url(#goldGrad)">DOKA</text>

  <!-- Subword: MINING -->
  <text x="71" y="50" font-family="Georgia, 'Times New Roman', serif" font-size="10" font-weight="400" letter-spacing="6" fill="#C9A84C" opacity="0.85">MINING</text>
