<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>News — DOKA Mining</title>
  <link rel="stylesheet" href="../assets/css/style.css">
  <style>
    /* Article page layout */
    .article-hero {
      padding: calc(var(--nav-height) + 56px) 0 48px;
      background: var(--dark-surface);
      border-bottom: 1px solid var(--gold-border);
    }

    .article-hero__inner {
      max-width: 760px;
    }

    .article-hero__meta {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }

    .article-hero__cat {
      font-size: 0.65rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--gold);
      font-weight: 500;
    }

    .article-hero__date {
      font-size: 0.75rem;
      color: var(--text-muted);
    }

    .article-hero h1 {
      font-size: clamp(1.9rem, 3.5vw, 2.8rem);
      line-height: 1.15;
      color: var(--white);
      margin-bottom: 20px;
    }

    .article-hero__excerpt {
      font-size: 1.05rem;
      color: var(--text-secondary);
      line-height: 1.75;
    }

    /* Thumbnail */
    .article-thumb {
      width: 100%;
      max-height: 480px;
      overflow: hidden;
      border-radius: 8px;
      border: 1px solid var(--gold-border);
      margin: 48px 0;
    }

    .article-thumb img {
      width: 100%;
      height: 100%;
      max-height: 480px;
      object-fit: cover;
      display: block;
    }

    /* Article body text */
    .article-body {
      max-width: 720px;
    }

    .article-body p {
      font-size: 1rem;
      color: var(--text-secondary);
      line-height: 1.85;
      margin-bottom: 1.4em;
    }

    .article-body p:last-child {
      margin-bottom: 0;
    }

    /* Divider */
    .article-divider {
      border: none;
      border-top: 1px solid var(--dark-border);
      margin: 56px 0;
    }

    /* Back link */
    .article-back {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 0.72rem;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-muted);
      text-decoration: none;
      transition: color 0.3s ease;
    }

    .article-back::before { content: '←'; }
    .article-back:hover { color: var(--gold); }

    /* Loading / error */
    .article-state {
      padding: 80px 0;
      color: var(--text-muted);
      font-size: 0.9rem;
    }
  </style>
</head>
<body>

<div id="nav-placeholder"></div>

<!-- Content injected by JS -->
<div id="articleWrap">
  <section class="article-hero">
    <div class="container">
      <div class="article-state">Loading article&hellip;</div>
    </div>
  </section>
</div>

<div id="footer-placeholder"></div>
<script>const ROOT_PATH = '../'; const LANG = 'en'; const LANG_EQUIV = '';</script>
<script src="../assets/js/main.js"></script>
<script>
(function () {
  'use strict';

  const ROOT = '../';
  const lang = 'en';
  const DATA = ROOT + 'assets/data/news-data.json';

  const CAT_LABELS = {
    corporate:      'Corporate',
    exploration:    'Exploration',
    sustainability: 'Sustainability',
    community:      'Community',
    press:          'Press'
  };

  /* Get ?id= from URL */
  const params = new URLSearchParams(window.location.search);
  const articleId = params.get('id');

  if (!articleId) {
    showError('No article specified.');
    loadNav();
  } else {
    fetch(DATA)
      .then(r => { if (!r.ok) throw new Error(); return r.json(); })
      .then(data => {
        const article = (data.articles || []).find(a => a.id === articleId);
        if (!article) { showError('Article not found.'); return; }

        /* External articles: redirect immediately */
        if (article.type === 'external') {
          window.location.replace(article.sourceUrl);
          return;
        }

        renderArticle(article);
      })
      .catch(() => showError('Unable to load article. Please try again later.'));
  }

  function renderArticle(a) {
    const t = a[lang];

    /* Update page title */
    document.title = t.title + ' — DOKA Mining';

    /* Update LANG_EQUIV for the nav language switcher */
    window.LANG_EQUIV = 'tr/news/article.html?id=' + a.id;

    /* Thumbnail block */
    const thumbHTML = a.thumbnail
      ? `<div class="article-thumb"><img src="${ROOT}${a.thumbnail}" alt="${t.title}" loading="lazy"></div>`
      : '';

    /* Hero section */
    const heroHTML = `
      <section class="article-hero">
        <div class="container">
          <div class="page-hero__breadcrumb" style="margin-bottom:28px;">
            <a href="${ROOT}index.html">Home</a><span>/</span>
            <a href="${ROOT}newsroom.html">Newsroom</a><span>/</span>
            <span>${CAT_LABELS[a.category] || a.category}</span>
          </div>
          <div class="article-hero__inner">
            <div class="article-hero__meta">
              <span class="article-hero__cat">${CAT_LABELS[a.category] || a.category}</span>
              <span class="article-hero__date">${a.dateDisplay[lang]}</span>
            </div>
            <h1>${t.title}</h1>
            <p class="article-hero__excerpt">${t.excerpt}</p>
          </div>
        </div>
      </section>`;

    /* Body section */
    const bodyHTML = `
      <section class="section section--dark">
        <div class="container">
          ${thumbHTML}
          <div class="article-body">
            ${t.content || ''}
          </div>
          <hr class="article-divider">
          <a href="${ROOT}newsroom.html" class="article-back">Back to Newsroom</a>
        </div>
      </section>`;

    document.getElementById('articleWrap').innerHTML = heroHTML + bodyHTML;
  }

  function showError(msg) {
    document.getElementById('articleWrap').innerHTML = `
      <section class="article-hero">
        <div class="container">
          <div class="article-state">${msg} <a href="${ROOT}newsroom.html" style="color:var(--gold);">Return to Newsroom</a></div>
        </div>
      </section>`;
  }
}());
</script>
</body>
</html>
